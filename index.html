<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#007AFF">
<title>日程日历</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root { --primary:#007AFF; --primaryD:#0051D5; --bg:#F2F2F7; --card:#FFFFFF; --text:#1C1C1E; --text2:#8E8E93; --border:#E5E5EA; --danger:#FF3B30; --success:#34C759; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}

/* 冻结顶部 */
.sticky-header{position:sticky;top:0;z-index:100}
.appbar{background:linear-gradient(135deg,var(--primary) 0%,var(--primaryD) 100%);color:#fff;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));box-shadow:0 2px 10px rgba(0,0,0,.15)}
.appbar-title{font-size:19px;font-weight:700;text-align:center;margin-bottom:10px}
.appbar-nav{display:flex;justify-content:space-between;align-items:center;gap:8px}
.appbar-nav button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 14px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:600}
.appbar-nav button:active{background:rgba(255,255,255,.35)}
.appbar-date{font-size:15px;font-weight:700;flex:1;text-align:center}
.notif-toggle{font-size:18px;padding:8px 11px!important}
.notif-toggle.off{opacity:.4}

/* 视图切换标签 */
.view-tabs{background:var(--card);margin:0 12px;border-radius:16px 16px 0 0;padding:12px 14px;display:flex;gap:8px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.view-tab{flex:1;padding:10px 16px;border:none;border-radius:12px;background:var(--bg);color:var(--text2);font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.view-tab:active{transform:scale(.98)}
.view-tab.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(0,122,255,.3)}

/* 月总览 */
.month-strip{background:var(--card);margin:0 12px;border-radius:0 0 16px 16px;padding:12px 14px 14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.month-strip-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 4px}
.month-strip-header span{font-size:15px;font-weight:800;color:var(--text)}
.month-strip-header .mn{display:flex;gap:5px}
.month-strip-header .mn button{background:var(--bg);border:none;border-radius:8px;padding:4px 12px;font-size:12px;color:var(--text2);cursor:pointer;font-weight:700}
.month-strip-header .mn button:active{background:var(--border)}
.mw{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:11px;color:var(--text2);padding:6px 0 4px;font-weight:700}
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.mc{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;font-size:14px;color:var(--text);font-weight:600;min-height:44px}
.mc:active{background:var(--bg)}
.mc.sel{background:var(--primary);color:#fff;box-shadow:0 3px 10px rgba(0,122,255,.3)}
.mc.today:not(.sel){color:var(--primary);font-weight:800;border:2px solid var(--primary)}
.mc.other{color:#C7C7CC}
.mc .mdots{display:flex;gap:3px;margin-top:2px;position:absolute;bottom:4px}
.mc .mdot{width:5px;height:5px;border-radius:50%}
.mc.sel .mdot{background:rgba(255,255,255,.9)!important}
.mc .mf{font-size:10px;color:#FF6B6B;font-weight:700;margin-top:1px}
.mc.sel .mf{color:rgba(255,255,255,.95)}
.mc .mj{font-size:9px;color:#8E8E93;margin-top:1px}
.mc.sel .mj{color:rgba(255,255,255,.7)}

/* ===== 任务列表视图 ===== */
.task-list{background:var(--card);margin:12px 12px 30px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden;min-height:200px}
.task-list-header{padding:16px 18px;border-bottom:2px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:#FAFAFA}
.task-list-header h3{font-size:16px;font-weight:800}
.task-list-header .sub{font-size:13px;color:var(--text2);font-weight:600}

.task-list-body{padding:14px 16px 18px}
.task-card{display:flex;gap:14px;padding:16px;border-radius:14px;margin-bottom:12px;background:#fff;border:1.5px solid var(--border);position:relative;overflow:hidden;touch-action:pan-y;transition:transform .2s}
.task-card.swiping{transition:none}
.task-card.swiped{transform:translateX(-80px)}
.task-card.swiping-back{transition:transform .2s}
.task-delete-btn{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:80px;height:64px;background:var(--danger);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .2s}
.task-card.swiped .task-delete-btn{opacity:1;pointer-events:auto}
.task-card:last-child{margin-bottom:0}
.task-card:active{background:#F8F8F8}
/* 左侧彩色竖条 */
.task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:14px 0 0 14px}

.task-time-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:60px;flex-shrink:0}
.task-time-start{font-size:20px;font-weight:800;color:var(--text);line-height:1}
.task-time-end{font-size:13px;color:var(--text2);margin-top:4px;font-weight:600}
.task-time-duration{font-size:11px;color:#C7C7CC;margin-top:2px;font-weight:600;background:#F2F2F7;padding:2px 8px;border-radius:10px}

.task-content{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:8px}
.task-content-top{display:flex;align-items:center;gap:8px}
.task-content-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px}
.task-content-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.3}
.task-content-type{font-size:11px;color:var(--text2);font-weight:700;white-space:nowrap;background:#F2F2F7;padding:3px 10px;border-radius:10px;flex-shrink:0}
.task-content-note{font-size:13px;color:var(--text2);line-height:1.5;margin-top:4px;word-break:break-all}

.empty-day{text-align:center;padding:70px 20px;color:var(--text2);font-size:15px;line-height:2}

/* 完成状态 */
.task-card.completed{opacity:.6;background:#F8F8F8}
.task-card.completed .task-content-title{text-decoration:line-through;color:var(--text2)}
.task-check{width:24px;height:24px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;margin-right:8px;transition:.15s}
.task-check.on{background:var(--success);border-color:var(--success);color:#fff}
.task-check.on::after{content:'✓';font-size:16px;font-weight:900}

/* 月度复盘视图 */
.month-review{background:var(--card);margin:12px 12px 30px;border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.month-review-header{padding:16px 18px;border-bottom:2px solid var(--border);background:#FAFAFA;display:flex;justify-content:space-between;align-items:center}
.month-review-header h3{font-size:16px;font-weight:800}
.month-review-header .sub{font-size:13px;color:var(--text2);font-weight:600}
.month-review-body{padding:18px}
.review-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.stat-card{background:#F8F8F8;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:22px;font-weight:900;color:var(--primary);line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px;font-weight:700}
.review-list{max-height:300px;overflow-y:auto}
.review-item{display:flex;justify-content:space-between;padding:10px 12px;border-radius:10px;margin-bottom:8px;background:#F8F8F8;font-size:13px}
.review-item.done{background:#E8F5E9}
.review-item.miss{background:#FFEBEE}
.review-item .date{font-weight:700;color:var(--text)}
.review-item .title{flex:1;margin:0 12px;color:var(--text2)}
.review-item .status{font-weight:700;font-size:12px}
.review-item.done .status{color:var(--success)}
.review-item.miss .status{color:var(--danger)}

/* FAB */
.fab{position:fixed;bottom:calc(22px + env(safe-area-inset-bottom));right:22px;width:58px;height:58px;background:linear-gradient(135deg,var(--primary) 0%,var(--primaryD) 100%);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,122,255,.4);font-size:30px;color:#fff;border:none;z-index:200;cursor:pointer}
.fab:active{transform:scale(.92)}
.fab-review{display:none}

/* 弹窗 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:300;padding:16px}
.overlay.on{display:flex}
.sheet{background:var(--card);border-radius:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto;padding:24px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:20px;color:var(--text)}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:700}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:16px;font-family:inherit;background:var(--bg);color:var(--text);-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary)}
.fg textarea{resize:none;min-height:72px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btns{display:flex;gap:10px;margin-top:22px}
.btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer}
.btn-p{background:var(--primary);color:#fff}
.btn-s{background:var(--bg);color:var(--text)}
.btn-d{background:#FFE5E5;color:var(--danger)}
.btn:active{opacity:.8}
.cp{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px}
.cp .co{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:.15s;position:relative}
.cp .co.on{border-color:var(--text);transform:scale(1.12)}
.cp .co.on::after{content:'\2713';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.warn{background:#FFF9E5;border:1px solid #FFD60A;color:#8A6D00;padding:10px 12px;border-radius:10px;margin-bottom:16px;font-size:13px;display:none;font-weight:600}
.warn.on{display:block}
</style>
</head>
<body>
<div class="sticky-header">
  <div class="appbar">
    <div class="appbar-title">📅 日程日历</div>
    <div class="appbar-nav">
      <button onclick="prevDay()">◀ 前一天</button>
      <span class="appbar-date" id="topDate">--</span>
      <button onclick="nextDay()">后一天 ▶</button>
      <button class="notif-toggle" id="notifBtn" onclick="toggleNotif()">🔔</button>
    </div>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" id="tabTask" onclick="switchView('task')">📋 任务</button>
    <button class="view-tab" id="tabReview" onclick="switchView('review')">📊 复盘</button>
  </div>
  <div class="month-strip" id="monthStrip"></div>
</div>

<div class="task-list" id="taskList"></div>

<div class="month-review" id="monthReview" style="display:none"></div>

<button class="fab" onclick="openModal()">+</button>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <h2 id="modalTitle">添加任务</h2>
    <div class="warn" id="warn"></div>

    <div class="fg">
      <label>任务标题</label>
      <input type="text" id="mTitle" placeholder="例如：晨会">
    </div>

    <div class="fg">
      <label>日期</label>
      <input type="date" id="mDate">
    </div>

    <div class="row2">
      <div class="fg">
        <label>开始时间</label>
        <input type="time" id="mStart" onchange="adjustEndTime();checkConflict()">
      </div>
      <div class="fg">
        <label>结束时间</label>
        <input type="time" id="mEnd" onchange="checkConflict()">
      </div>
    </div>

    <div class="fg">
      <label>类型</label>
      <select id="mType" onchange="typeChange()">
        <option value="work">💼 工作</option>
        <option value="meeting">📋 会议</option>
        <option value="personal">🏠 个人</option>
        <option value="other">📌 其他</option>
      </select>
    </div>

    <div class="fg" style="display:none">
      <label>颜色</label>
      <div class="cp" id="colorPick"></div>
    </div>

    <div class="fg">
      <label>提前提醒</label>
      <select id="mReminder">
        <option value="0">不提醒</option>
        <option value="5">提前 5 分钟</option>
        <option value="10">提前 10 分钟</option>
        <option value="15">提前 15 分钟</option>
        <option value="30">提前 30 分钟</option>
        <option value="60">提前 1 小时</option>
      </select>
    </div>

    <div class="fg">
      <label>备注</label>
      <textarea id="mNote" placeholder="可选备注..."></textarea>
    </div>

    <input type="hidden" id="mId">

    <div class="btns">
      <button class="btn btn-s" onclick="closeModal()">取消</button>
      <button class="btn btn-d" id="delBtn" style="display:none" onclick="delTask()">删除</button>
      <button class="btn btn-p" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<script>
const COLORS=['#007AFF','#FF3B30','#AF52DE','#34C759','#FF9500','#FF2D55','#5AC8FA','#5856D6','#FF6482','#A2845E','#00C7BE','#32ADE6','#64D2FF','#BF5AF2','#8E8E93','#C7C7CC'];
const TYPE_COLOR={work:'#007AFF',meeting:'#AF52DE',personal:'#34C759',other:'#FF9500'};
const TYPE_ICON={work:'💼',meeting:'📋',personal:'🏠',other:'📌'};
const TYPE_NAME={work:'工作',meeting:'会议',personal:'个人',other:'其他'};
const WEEK=['日','一','二','三','四','五','六'];
const K_TASKS='cal_tasks_v1';
const K_NOTIFIED='cal_notified_v1';

/* 节假日 (2026 年) */
const HOLIDAYS={
  '01-01':'元旦',
  '01-22':'除夕',
  '01-23':'春节',
  '01-24':'春节',
  '01-25':'春节',
  '02-14':'情人节',
  '04-05':'清明',
  '05-01':'劳动节',
  '06-19':'端午',
  '08-19':'七夕',
  '09-27':'中秋',
  '10-01':'国庆',
  '10-02':'国庆',
  '10-03':'国庆',
  '12-25':'圣诞'
};

/* 24 节气 */
const SOLAR_TERMS=[
  {name:'小寒',date:'01-05'},{name:'大寒',date:'01-20'},
  {name:'立春',date:'02-03'},{name:'雨水',date:'02-18'},
  {name:'惊蛰',date:'03-05'},{name:'春分',date:'03-20'},
  {name:'清明',date:'04-04'},{name:'谷雨',date:'04-19'},
  {name:'立夏',date:'05-05'},{name:'小满',date:'05-20'},
  {name:'芒种',date:'06-05'},{name:'夏至',date:'06-21'},
  {name:'小暑',date:'07-07'},{name:'大暑',date:'07-22'},
  {name:'立秋',date:'08-07'},{name:'处暑',date:'08-22'},
  {name:'白露',date:'09-07'},{name:'秋分',date:'09-22'},
  {name:'寒露',date:'10-08'},{name:'霜降',date:'10-23'},
  {name:'立冬',date:'11-07'},{name:'小雪',date:'11-22'},
  {name:'大雪',date:'12-07'},{name:'冬至',date:'12-21'}
];

function getHoliday(md){return HOLIDAYS[md]||null;}
function getSolarTerm(md){const st=SOLAR_TERMS.find(s=>s.date===md);return st?st.name:null;}

let curDate=new Date();
let tasks=[];
let editId=null;
let selColor=null;
let notifOn=false;
let notifTimer=null;
let currentView='task';
let touchStartX=0;
let touchCurrentX=0;
let swipedElement=null;

function load(){
  try{tasks=JSON.parse(localStorage.getItem(K_TASKS)||'[]');}catch(e){tasks=[];}
  render();
  initNotif();
}
function persist(){
  localStorage.setItem(K_TASKS,JSON.stringify(tasks));
  resetSwipe();
}

function render(){
  const y=curDate.getFullYear(),m=curDate.getMonth()+1,d=curDate.getDate(),w=WEEK[curDate.getDay()];
  document.getElementById('topDate').textContent=`${y}年${m}月${d}日 周${w}`;
  renderMonth();
  if(currentView==='task'){renderTaskList();}else{renderMonthReview();}
}

/* ===== 月总览 ===== */
function renderMonth(){
  const el=document.getElementById('monthStrip');
  const y=curDate.getFullYear(),mo=curDate.getMonth();
  const today=fmtISO(new Date());
  const sel=fmtISO(curDate);
  const fd=new Date(y,mo,1);
  const ld=new Date(y,mo+1,0);
  const off=fd.getDay();
  const dim=ld.getDate();
  const pml=new Date(y,mo,0).getDate();
  const cells=Math.ceil((off+dim)/7)*7;

  let h=`<div class="month-strip-header"><span>${y}年${mo+1}月</span><div class="mn"><button onclick="addMonth(-1)">◀</button><button onclick="addMonth(1)">▶</button></div></div>`;
  h+='<div class="mw">'+WEEK.map(w=>`<div>${w}</div>`).join('')+'</div>';
  h+='<div class="mg">';
  for(let i=0;i<cells;i++){
    let dn,cm,ds;
    if(i<off){dn=pml-off+1+i;cm=false;ds=fmtISO(new Date(y,mo-1,dn));}
    else if(i<off+dim){dn=i-off+1;cm=true;ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;}
    else{dn=i-off-dim+1;cm=false;ds=fmtISO(new Date(y,mo+1,dn));}
    const ts=tasks.filter(t=>t.date===ds);
    const cls='mc'+(ds===sel?' sel':'')+(ds===today?' today':'')+(!cm?' other':'');
    let dots='';
    if(ts.length){const uc=[...new Set(ts.map(t=>t.color||TYPE_COLOR[t.type]||'#007AFF'))];dots='<div class="mdots">'+uc.slice(0,4).map(c=>`<div class="mdot" style="background:${c}"></div>`).join('')+'</div>';}
    const hol=cm?getHoliday(ds.slice(5)):null;
    const stm=cm?getSolarTerm(ds.slice(5)):null;
    let extra='';
    if(hol){extra=`<div class="mf">${hol}</div>`;}else if(stm){extra=`<div class="mj">${stm}</div>`;}
    h+=`<div class="${cls}" onclick="goto('${ds}')"><div>${dn}${dots}</div>${extra}</div>`;
  }
  h+='</div>';
  el.innerHTML=h;
}

/* ===== 视图切换 ===== */
function switchView(view){
  currentView=view;
  if(view==='task'){
    document.getElementById('tabTask').classList.add('active');
    document.getElementById('tabReview').classList.remove('active');
    document.getElementById('taskList').style.display='block';
    document.getElementById('monthReview').style.display='none';
    renderTaskList();
  }else{
    document.getElementById('tabTask').classList.remove('active');
    document.getElementById('tabReview').classList.add('active');
    document.getElementById('taskList').style.display='none';
    document.getElementById('monthReview').style.display='block';
    renderMonthReview();
  }
}

/* ===== 任务列表视图 ===== */
function renderTaskList(){
  const ds=fmtISO(curDate);
  const ts=tasks.filter(t=>t.date===ds).sort((a,b)=>toMin(a.start)-toMin(b.start));
  const el=document.getElementById('taskList');

  let h=`<div class="task-list-header"><h3>📋 今日安排</h3><span class="sub">${ds} · ${ts.length} 项</span></div>`;

  if(ts.length===0){
    h+=`<div class="empty-day">暂无任务<br>点击右下角 + 添加</div>`;
    el.innerHTML=h;
    return;
  }

  h+='<div class="task-list-body">';
  ts.forEach(t=>{h+=renderTaskCard(t);});
  h+='</div>';
  el.innerHTML=h;
}

function renderTaskCard(t){
  const c=t.color||TYPE_COLOR[t.type]||'#007AFF';
  const sm=toMin(t.start),em=toMin(t.end);
  const durMin=em-sm;
  const durH=Math.floor(durMin/60);
  const durM=durMin%60;
  let durStr='';
  if(durH>0&&durM>0) durStr=`${durH}小时${durM}分`;
  else if(durH>0) durStr=`${durH}小时`;
  else durStr=`${durM}分钟`;

  const typeLabel=TYPE_NAME[t.type]||'其他';
  const typeIcon=TYPE_ICON[t.type]||'📌';

  const completed=t.completed?'completed':'';
return `<div class="task-card ${completed}" style="border-color:${c}33" data-id="${t.id}" ontouchstart="handleTouchStart(event,this)" ontouchmove="handleTouchMove(event,this)" ontouchend="handleTouchEnd(event,this)" onclick="handleCardClick(event,${t.id})">
    <div class="task-content-top">
  <div class="task-check ${t.completed?'on':''}" onclick="event.stopPropagation();toggleComplete(${t.id})"></div>
  <div class="task-time-col">
      <div class="task-time-start">${t.start}</div>
      <div class="task-time-end">${t.end}</div>
      <div class="task-time-duration">${durStr}</div>
    </div>
    </div>
    <div class="task-content">
      <div class="task-content-header">
        <div class="task-content-title">${esc(t.title)}</div>
        <div class="task-content-type" style="color:${c}">${typeIcon} ${typeLabel}</div>
      </div>
      ${t.note?`<div class="task-content-note">${esc(t.note)}</div>`:''}
    </div>
    <div style="position:absolute;left:0;top:0;bottom:0;width:5px;background:${c};border-radius:14px 0 0 14px"></div>
    <div class="task-delete-btn" onclick="event.stopPropagation();delTaskById(${t.id})">删除</div>
  </div>`;
}

function toMin(s){const[h,m]=s.split(':').map(Number);return h*60+m;}
function fmtISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
function adjustEndTime(){
  const startEl=document.getElementById('mStart');
  const endEl=document.getElementById('mEnd');
  if(!startEl.value||!endEl.value)return;
  if(toMin(endEl.value)<=toMin(startEl.value)){
    const[startH,startM]=startEl.value.split(':').map(Number);
    let newEndH=startH+1;
    if(newEndH>=24){newEndH=23;}
    endEl.value=`${String(newEndH).padStart(2,'0')}:${String(startM).padStart(2,'0')}`;
  }
}

/* 导航 */
function prevDay(){curDate.setDate(curDate.getDate()-1);render();}
function nextDay(){curDate.setDate(curDate.getDate()+1);render();}
function addMonth(n){curDate.setMonth(curDate.getMonth()+n);render();}
function goto(ds){curDate=new Date(ds+'T00:00:00');render();}

/* 弹窗 */
function openModal(hr=9){
  editId=null;
  document.getElementById('modalTitle').textContent='添加任务';
  document.getElementById('delBtn').style.display='none';
  document.getElementById('mTitle').value='';
  document.getElementById('mDate').value=fmtISO(curDate);
  document.getElementById('mStart').value=`${String(hr).padStart(2,'0')}:00`;
  document.getElementById('mEnd').value=`${String(hr+1).padStart(2,'0')}:00`;
  document.getElementById('mType').value='work';
  document.getElementById('mReminder').value='5';
  document.getElementById('mNote').value='';
  document.getElementById('warn').classList.remove('on');
  selColor=null;initCP();typeChange();
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function editModal(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editId=id;
  document.getElementById('modalTitle').textContent='编辑任务';
  document.getElementById('delBtn').style.display='block';
  document.getElementById('mTitle').value=t.title;
  document.getElementById('mDate').value=t.date;
  document.getElementById('mStart').value=t.start;
  document.getElementById('mEnd').value=t.end;
  document.getElementById('mType').value=t.type;
  document.getElementById('mReminder').value=t.reminder||'0';
  document.getElementById('mNote').value=t.note||'';
  document.getElementById('warn').classList.remove('on');
  selColor=t.color||null;initCP();
  document.getElementById('overlay').classList.add('on');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('overlay').classList.remove('on');document.body.style.overflow='';}

function getForm(){
  return{
    id:editId,
    title:document.getElementById('mTitle').value.trim(),
    date:document.getElementById('mDate').value,
    start:document.getElementById('mStart').value,
    end:document.getElementById('mEnd').value,
    type:document.getElementById('mType').value,
    color:selColor,
    reminder:parseInt(document.getElementById('mReminder').value)||0,
    note:document.getElementById('mNote').value
  };
}
function saveTask(){
  const t=getForm();
  if(!t.title){alert('请输入任务标题');return;}
  if(!t.date){alert('请选择日期');return;}
  if(t.start>=t.end){alert('结束时间必须晚于开始时间');return;}
  if(editId!==null){const i=tasks.findIndex(x=>x.id===editId);if(i>-1)tasks[i]=t;}
  else{t.id=Date.now();tasks.push(t);}
  persist();closeModal();render();
}
function delTask(){if(editId!==null&&confirm('确定删除？')){tasks=tasks.filter(x=>x.id!==editId);persist();closeModal();render();}}
function delTaskById(id){if(confirm('确定删除？')){tasks=tasks.filter(x=>x.id!==id);persist();render();resetSwipe();}}

/* 左滑删除 */
function handleTouchStart(e,el){
  touchStartX=e.changedTouches[0].screenX;
  touchCurrentX=touchStartX;
  swipedElement=el;
  el.classList.add('swiping');
}
function handleTouchMove(e,el){
  touchCurrentX=e.changedTouches[0].screenX;
  const diff=touchCurrentX-touchStartX;
  if(diff<0){
    const move=Math.min(Math.abs(diff),80);
    el.style.transform=`translateX(-${move}px)`;
  }else if(el.classList.contains('swiped')){
    const move=80-Math.min(diff,80);
    el.style.transform=`translateX(-${move}px)`;
  }
}
function handleTouchEnd(e,el){
  el.classList.remove('swiping');
  const diff=touchCurrentX-touchStartX;
  if(el.classList.contains('swiped')){
    if(diff>40){
      el.classList.remove('swiped');
      el.classList.add('swiping-back');
      setTimeout(()=>{
        el.classList.remove('swiping-back');
        el.style.transform='';
      },200);
    }else{
      el.classList.add('swiped');
    }
  }else{
    if(diff<-40){
      el.classList.add('swiped');
    }else{
      el.style.transform='';
    }
  }
  swipedElement=null;
}
function handleCardClick(e,id){
  if(!e.target.closest('.task-check')){editModal(id);}
}
function resetSwipe(){
  document.querySelectorAll('.task-card.swiped').forEach(el=>{
    el.classList.remove('swiped');
    el.style.transform='';
  });
}

/* 完成状态切换 */
function toggleComplete(id){
  const t=tasks.find(x=>x.id===id);
  if(t){t.completed=!t.completed;persist();render();}
}

/* 月度复盘视图 */
function renderMonthReview(){
  const el=document.getElementById('monthReview');
  const y=curDate.getFullYear(),m=curDate.getMonth()+1;
  const monthStr=`${y}-${String(m).padStart(2,'0')}`;
  const monthTasks=tasks.filter(t=>t.date.startsWith(monthStr));
  const total=monthTasks.length;
  const completed=monthTasks.filter(t=>t.completed).length;
  
  let h=`<div class="month-review-header"><h3>📊 ${y}年${m}月 任务复盘</h3><span class="sub">${total} 项任务</span></div>`;
  h+='<div class="month-review-body">';
  h+=`<div class="review-stats">
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">总任务数</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--success)">${completed}</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--danger)">${total-completed}</div><div class="stat-label">未完成</div></div>
  </div>`;
  
  if(total===0){
    h+='<div class="empty-day">本月暂无任务记录</div>';
  }else{
    h+='<div style="margin-bottom:12px;font-size:14px;font-weight:800;color:var(--text2)">任务列表</div>';
    h+='<div class="review-list">';
    monthTasks.sort((a,b)=>a.date.localeCompare(b.date)||toMin(a.start)-toMin(b.start)).forEach(t=>{
      const cls=t.completed?'done':'miss';
      const status=t.completed?'✅ 完成':'❌ 未完成';
      h+=`<div class="review-item ${cls}"><span class="date">${t.date.slice(5)}</span><span class="title">${esc(t.title)}</span><span class="status">${status}</span></div>`;
    });
    h+='</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function initCP(){
  const el=document.getElementById('colorPick');el.innerHTML='';
  COLORS.forEach(c=>{const d=document.createElement('div');d.className='co'+(selColor===c?' on':'');d.style.background=c;d.onclick=()=>{selColor=c;initCP();};el.appendChild(d);});
}
function typeChange(){const ty=document.getElementById('mType').value;if(!selColor)selColor=TYPE_COLOR[ty];initCP();}

function conflict(t,skip){
  return tasks.some(x=>{
    if(skip&&x.id===skip)return false;
    if(x.date!==t.date)return false;
    const a=toMin(t.start),b=toMin(t.end),c=toMin(x.start),d=toMin(x.end);
    return a<d&&b>c;
  });
}
function checkConflict(){
  const t=getForm();
  const w=document.getElementById('warn');
  if(conflict(t,editId)){
    const cs=tasks.filter(x=>{if(editId&&x.id===editId)return false;if(x.date!==t.date)return false;const a=toMin(t.start),b=toMin(t.end),c=toMin(x.start),d=toMin(x.end);return a<d&&b>c;});
    w.textContent=`⚠️ 与 ${cs.map(x=>x.title).join('、')} 冲突`;w.classList.add('on');
  }else w.classList.remove('on');
}

/* 通知 */
function initNotif(){
  if(!('Notification' in window)){document.getElementById('notifBtn').style.display='none';return;}
  notifOn=Notification.permission==='granted';
  updateNotifBtn();
  if(notifOn)startTimer();
}
function toggleNotif(){
  if(!('Notification' in window)){alert('设备不支持通知');return;}
  if(Notification.permission==='granted'){
    notifOn=!notifOn;updateNotifBtn();
    if(notifOn){startTimer();new Notification('🔔 已开启',{body:'任务开始前将收到提醒'});}
    else stopTimer();
  }else if(Notification.permission==='denied'){
    alert('请在 iOS 设置 > Safari > 通知 中开启权限');
  }else{
    Notification.requestPermission().then(p=>{
      if(p==='granted'){notifOn=true;updateNotifBtn();startTimer();new Notification('🔔 已开启',{body:'任务开始前将收到提醒'});}
      else alert('需要通知权限');
    });
  }
}
function updateNotifBtn(){const b=document.getElementById('notifBtn');b.textContent=notifOn?'🔔':'🔕';b.classList.toggle('off',!notifOn);}
function startTimer(){if(notifTimer)return;checkNotif();notifTimer=setInterval(checkNotif,30000);}
function stopTimer(){if(notifTimer){clearInterval(notifTimer);notifTimer=null;}}
function checkNotif(){
  if(!notifOn||Notification.permission!=='granted')return;
  const now=new Date(),cd=fmtISO(now),cm=now.getHours()*60+now.getMinutes();
  let notified=[];try{notified=JSON.parse(localStorage.getItem(K_NOTIFIED)||'[]');}catch(e){}
  tasks.forEach(t=>{
    if(!t.reminder||t.reminder<=0)return;
    if(t.date!==cd)return;
    const nid=`n_${t.id}_${t.date}_${t.start}_${t.reminder}`;
    if(notified.includes(nid))return;
    const ts=toMin(t.start),rm=parseInt(t.reminder),na=ts-rm;
    if(cm>=na&&cm<ts){pushNotif(t,rm);notified.push(nid);}
  });
  const td=fmtISO(now);
  localStorage.setItem(K_NOTIFIED,JSON.stringify(notified.filter(id=>id.split('_')[2]>=td)));
}
function pushNotif(t,rm){
  try{
    const label={work:'💼工作',meeting:'📋会议',personal:'🏠个人',other:'📌其他'}[t.type]||'📌任务';
    const m=rm<60?`${rm}分钟`:`${rm/60}小时`;
    new Notification(`⏰ ${label}提醒`,{body:`${t.title}\n${t.start} 开始（${m}后）`,tag:`cal-${t.id}`});
  }catch(e){}
}

document.addEventListener('DOMContentLoaded',load);
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
